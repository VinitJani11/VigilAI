<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Detection - VigilAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        video { display: block; }
        canvas { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
        .alert { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        .mode-btn-on  { background: #06b6d4; color: #000; }
        .mode-btn-off { background: #262626; color: #a3a3a3; }
        @keyframes logSlide { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }
        .log-item { animation: logSlide 0.3s ease; }
    </style>
</head>
<body class="bg-neutral-950 text-white">

<div class="max-w-7xl mx-auto p-8">
    <a href="/" class="inline-flex items-center gap-2 text-cyan-400 hover:text-cyan-300 mb-6">
        <i class="fa-solid fa-arrow-left"></i> Back to Dashboard
    </a>
    <h1 class="text-4xl font-bold mb-6">Live Detection</h1>

    <div class="flex gap-6" style="align-items:flex-start;">
        <div class="flex-1 min-w-0">
            <div class="bg-neutral-900 rounded-3xl p-6 mb-6">
                <h3 class="text-lg font-semibold mb-4">Detection Modes</h3>
                <div class="grid grid-cols-2 gap-4">
                    <button id="btn-yolo" onclick="toggleYolo()" 
                            class="mode-btn-on flex items-center justify-between px-5 py-4 rounded-2xl font-semibold transition-all">
                        <div class="flex items-center gap-3">
                            <i class="fa-solid fa-crosshairs text-xl"></i>
                            <div class="text-left">
                                <div>YOLO Detection</div>
                                <div class="text-xs font-normal mt-0.5 opacity-70">Knife & Pistol</div>
                            </div>
                        </div>
                        <span id="yolo-status" class="text-sm font-mono bg-black/20 px-3 py-1 rounded-xl">ON</span>
                    </button>
                    <button id="btn-criminal" onclick="toggleCriminalCheck()"
                            class="mode-btn-on flex items-center justify-between px-5 py-4 rounded-2xl font-semibold transition-all">
                        <div class="flex items-center gap-3">
                            <i class="fa-solid fa-user-secret text-xl"></i>
                            <div class="text-left">
                                <div>Criminal Match</div>
                                <div class="text-xs font-normal mt-0.5 opacity-70">Face Recognition</div>
                            </div>
                        </div>
                        <span id="criminal-status" class="text-sm font-mono bg-black/20 px-3 py-1 rounded-xl">ON</span>
                    </button>
                </div>
            </div>

            <div class="bg-neutral-900 rounded-3xl p-5 mb-6">
                <div class="flex justify-between items-center mb-3">
                    <h3 class="font-semibold">Confidence Threshold</h3>
                    <span id="conf-value" class="font-mono bg-neutral-800 px-4 py-1 rounded-xl text-cyan-400">0.30</span>
                </div>
                <input type="range" id="confidence-slider" min="0.10" max="0.80" step="0.01" value="0.30" class="w-full accent-cyan-500">
            </div>

            <div class="relative bg-black rounded-3xl overflow-hidden border border-white/10 shadow-2xl mb-4">
                <video id="video" autoplay playsinline class="w-full"></video>
                <canvas id="canvas"></canvas>
                <div id="camera-status" class="absolute top-4 right-4 bg-emerald-500 text-black text-xs font-mono px-3 py-1 rounded-2xl flex items-center gap-2 hidden">
                    <div class="w-2 h-2 bg-black rounded-full animate-pulse"></div> CAMERA LIVE
                </div>
            </div>

            <div id="weapon-alert" class="hidden mb-4 bg-red-600/20 border border-red-500 text-red-400 p-5 rounded-2xl text-center font-semibold text-lg alert">
                <i class="fa-solid fa-triangle-exclamation mr-2"></i>WEAPON DETECTED! Screenshot saved.
            </div>
            <div id="criminal-alert" class="hidden mb-4 bg-amber-600/20 border border-amber-500 text-amber-400 p-5 rounded-2xl text-center font-semibold text-xl alert"></div>
            <div id="auto-add-alert" class="hidden mb-4 bg-orange-600/20 border border-orange-500 text-orange-400 p-5 rounded-2xl text-center font-semibold alert"></div>

            <div class="flex gap-4 mt-2">
                <button onclick="startCamera()" class="flex-1 bg-cyan-500 hover:bg-cyan-400 text-black py-5 rounded-2xl font-semibold text-lg transition">
                    <i class="fa-solid fa-video mr-2"></i> Start Camera
                </button>
                <button onclick="stopCamera()" class="flex-1 bg-red-600 hover:bg-red-500 py-5 rounded-2xl font-semibold text-lg transition">
                    <i class="fa-solid fa-stop mr-2"></i> Stop Camera
                </button>
            </div>

            <div class="flex gap-4 mt-3">
                <button onclick="manualCapture()" class="flex-1 bg-emerald-600 hover:bg-emerald-500 py-3.5 rounded-2xl font-semibold transition">
                    <i class="fa-solid fa-camera mr-2"></i> Manual Screenshot
                </button>
                <a href="/detection-history.html" class="flex-1 bg-violet-600 hover:bg-violet-500 py-3.5 rounded-2xl font-semibold text-center flex items-center justify-center gap-2 transition">
                    <i class="fa-solid fa-clock-rotate-left"></i> Detection History
                </a>
            </div>
        </div>

        <div style="width:300px;flex-shrink:0;">
            <div class="bg-neutral-900 border border-neutral-800 rounded-3xl overflow-hidden" style="position:sticky;top:24px;">
                <div class="flex items-center justify-between px-5 py-4 border-b border-neutral-800">
                    <div class="flex items-center gap-2 font-semibold">
                        <i class="fa-solid fa-bell text-yellow-400 text-sm"></i> Alert Log
                    </div>
                    <div class="flex items-center gap-3">
                        <span id="alert-count" class="bg-rose-500/20 text-rose-400 text-xs font-mono px-2 py-0.5 rounded-full">0</span>
                        <button onclick="clearLog()" class="text-neutral-500 hover:text-neutral-300 text-xs transition">Clear</button>
                    </div>
                </div>
                <div id="alert-log" class="overflow-y-auto text-sm" style="max-height:520px;"></div>
                <div class="px-5 py-3 border-t border-neutral-800 text-xs text-neutral-600 text-center">Last 20 events</div>
            </div>
        </div>
    </div>
</div>

<script>
    const API = window.location.origin;
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    let stream = null;
    let interval = null;
    let currentConfidence = 0.30;
    let yoloEnabled = true;
    let criminalCheckEnabled = true;
    let autoAddCooldown = false;
    let lastWeaponTime = 0;
    let isCameraRunning = false;
    let isStartingCamera = false;
    let isProcessing = false;
    let animationFrame = null;
    let screenshotInFlight = false;
    let criminalCheckInFlight = false;
    let lastCriminalCheckTime = 0;

    let persistentDetections = [];
    const PERSIST_TIME = 2500;
    let lastDetectionTime = 0;
    const DETECTION_COOLDOWN = 650;
    let lastScreenshotTime = 0;
    const SCREENSHOT_COOLDOWN = 3000;
    const CRIMINAL_CHECK_COOLDOWN = 1500;
    let alertEvents = [];

    function addAlert(type, message, detail) {
        const now = new Date();
        const timeStr = now.toLocaleTimeString("en-GB", { hour12: false });
        alertEvents.unshift({ type, message, detail, timeStr });
        if (alertEvents.length > 20) alertEvents.pop();
        document.getElementById("alert-count").textContent = alertEvents.length;
        renderLog();
    }

    function renderLog() {
        const container = document.getElementById("alert-log");
        if (alertEvents.length === 0) {
            container.innerHTML = '<p class="text-neutral-600 text-center py-10 px-4 text-xs">Events will appear here when weapons or criminals are detected</p>';
            return;
        }
        container.innerHTML = alertEvents.map(e => {
            const icons = { 
                weapon: "fa-triangle-exclamation text-red-400", 
                match: "fa-face-viewfinder text-amber-400", 
                autoadd: "fa-user-plus text-orange-400", 
                manual: "fa-camera text-cyan-400" 
            };
            return `<div class="log-item log-${e.type} px-4 py-3 border-b border-neutral-800/50">
                <div class="flex items-start gap-2">
                    <i class="fa-solid ${icons[e.type] || 'fa-bell text-neutral-400'} mt-0.5 text-xs flex-shrink-0"></i>
                    <div class="flex-1 min-w-0">
                        <div class="font-semibold text-xs leading-tight">${e.message}</div>
                        ${e.detail ? `<div class="text-neutral-500 text-xs mt-0.5 truncate">${e.detail}</div>` : ''}
                    </div>
                    <div class="text-neutral-600 text-xs font-mono">${e.timeStr}</div>
                </div>
            </div>`;
        }).join('');
    }

    function clearLog() {
        alertEvents = [];
        document.getElementById("alert-count").textContent = "0";
        renderLog();
    }

    function toggleYolo() {
        yoloEnabled = !yoloEnabled;
        const btn = document.getElementById("btn-yolo");
        btn.className = (yoloEnabled ? "mode-btn-on" : "mode-btn-off") + " flex items-center justify-between px-5 py-4 rounded-2xl font-semibold transition-all";
        document.getElementById("yolo-status").textContent = yoloEnabled ? "ON" : "OFF";
    }

    function toggleCriminalCheck() {
        criminalCheckEnabled = !criminalCheckEnabled;
        const btn = document.getElementById("btn-criminal");
        btn.className = (criminalCheckEnabled ? "mode-btn-on" : "mode-btn-off") + " flex items-center justify-between px-5 py-4 rounded-2xl font-semibold transition-all";
        document.getElementById("criminal-status").textContent = criminalCheckEnabled ? "ON" : "OFF";
    }

    document.getElementById("confidence-slider").addEventListener("input", (e) => {
        currentConfidence = parseFloat(e.target.value);
        document.getElementById("conf-value").textContent = currentConfidence.toFixed(2);
    });

    async function startCamera() {
        try {
            if (isCameraRunning || isStartingCamera) {
                addAlert("manual", "Camera already running", "Live feed is active");
                return;
            }
            isStartingCamera = true;

            if (interval) {
                clearInterval(interval);
                interval = null;
            }
            if (animationFrame) {
                cancelAnimationFrame(animationFrame);
                animationFrame = null;
            }

            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
            video.srcObject = stream;
            video.onloadedmetadata = async () => {
                await video.play();
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                document.getElementById("camera-status").classList.remove("hidden");
                isCameraRunning = true;
                isStartingCamera = false;
                isProcessing = false;
                persistentDetections = [];
                lastDetectionTime = 0;
                drawLoop();
                interval = setInterval(detectFrame, 200);
                addAlert("manual", "Camera started", "Live feed active");
            };
        } catch (err) {
            isStartingCamera = false;
            alert("Camera access failed. Please allow camera permission.");
        }
    }

    function stopCamera() {
        isCameraRunning = false;
        isStartingCamera = false;
        isProcessing = false;
        screenshotInFlight = false;
        criminalCheckInFlight = false;
        if (interval) {
            clearInterval(interval);
            interval = null;
        }
        if (animationFrame) {
            cancelAnimationFrame(animationFrame);
            animationFrame = null;
        }
        if (stream) {
            stream.getTracks().forEach(t => t.stop());
            stream = null;
        }
        video.srcObject = null;
        persistentDetections = [];
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        document.getElementById("camera-status").classList.add("hidden");
    }

    function drawLoop() {
        if (!isCameraRunning) return;
        drawPersistentDetections();
        animationFrame = requestAnimationFrame(drawLoop);
    }

    function getAverageBrightness(context, w, h) {
        const data = context.getImageData(0, 0, w, h).data;
        let sum = 0;
        for (let i = 0; i < data.length; i += 4) sum += (data[i] + data[i+1] + data[i+2]) / 3;
        return sum / (w * h);
    }

    async function detectFrame() {
        if (!isCameraRunning || isProcessing || !video.videoWidth) return;

        isProcessing = true;

        if (!yoloEnabled && !criminalCheckEnabled) {
            isProcessing = false;
            return;
        }

        const now = Date.now();
        if (now - lastDetectionTime < DETECTION_COOLDOWN) {
            drawPersistentDetections();
            isProcessing = false;
            return;
        }
        
        const tempCanvas = document.createElement("canvas");
        tempCanvas.width = video.videoWidth;
        tempCanvas.height = video.videoHeight;
        const tempCtx = tempCanvas.getContext("2d");
        tempCtx.drawImage(video, 0, 0);

        if (getAverageBrightness(tempCtx, tempCanvas.width, tempCanvas.height) < 18) {
            drawPersistentDetections();
            isProcessing = false;
            return;
        }

        lastDetectionTime = now;

        tempCanvas.toBlob(async (blob) => {
            if (!blob) { isProcessing = false; return; }
            
            const form = new FormData();
            form.append("file", blob, "frame.jpg");

            try {
                const res = await fetch(`${API}/detect?confidence=${currentConfidence}`, { method: "POST", body: form });
                if (!res.ok) throw new Error("API error");
                
                const data = await res.json();
                const detections = data.detections || [];

                persistentDetections = detections.map(det => ({ ...det, timestamp: Date.now() }));
                drawPersistentDetections();

                let hasWeapon = false;
                let bestFace = null;

                detections.forEach(det => {
                    const cls = det.class.toLowerCase();
                    if (cls.includes("knife") || cls.includes("pistol") || cls.includes("gun")) hasWeapon = true;
                    if ((cls.includes("face") || cls.includes("person")) && det.confidence > 0.55) {
                        if (!bestFace || det.confidence > bestFace.confidence) 
                            bestFace = { bbox: det.bbox, confidence: det.confidence };
                    }
                });

                if (hasWeapon) {
                    lastWeaponTime = Date.now();
                    document.getElementById("weapon-alert").classList.remove("hidden");
                    setTimeout(() => document.getElementById("weapon-alert").classList.add("hidden"), 4000);

                    captureScreenshot();
                    const weaponNames = detections.filter(d => /knife|pistol|gun/.test(d.class.toLowerCase()))
                                                  .map(d => d.class).join(", ");
                    if (Date.now() - lastScreenshotTime < 500) {
                        addAlert("weapon", "WEAPON DETECTED", weaponNames + " · screenshot saved");
                    }

                    if (bestFace && !autoAddCooldown) {
                        autoAddCooldown = true;
                        autoAddCriminal(bestFace.bbox);
                        setTimeout(() => autoAddCooldown = false, 25000);
                    }
                }

                if (criminalCheckEnabled && bestFace && !criminalCheckInFlight && Date.now() - lastCriminalCheckTime > CRIMINAL_CHECK_COOLDOWN) {
                    lastCriminalCheckTime = Date.now();
                    criminalCheckInFlight = true;
                    checkCriminalMatch(bestFace.bbox).finally(() => {
                        criminalCheckInFlight = false;
                    });
                }
            } catch (e) { 
                console.error("Detection cycle failed:", e); 
            } finally {
                isProcessing = false;
            }
        }, "image/jpeg", 0.65);
    }

    function drawPersistentDetections() {
        const now = Date.now();
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        for (let i = persistentDetections.length - 1; i >= 0; i--) {
            const det = persistentDetections[i];
            const age = now - det.timestamp;
            if (age > PERSIST_TIME) {
                persistentDetections.splice(i, 1);
                continue;
            }

            const alpha = Math.max(0.25, 1 - (age / PERSIST_TIME));
            const cls = det.class.toLowerCase();
            const [x, y, w, h] = det.bbox || [0,0,0,0];

            ctx.globalAlpha = alpha;
            ctx.strokeStyle = (cls.includes("face") || cls.includes("person")) ? "#22ff88" : "#ff3366";
            ctx.lineWidth = 7;
            ctx.strokeRect(x, y, w, h);

            ctx.fillStyle = `rgba(255,255,255,${alpha})`;
            ctx.font = "bold 21px Arial";
            ctx.fillText(`${det.class} ${(det.confidence*100).toFixed(0)}%`, x, y - 12);
        }
        ctx.globalAlpha = 1;
    }

    async function autoAddCriminal(bbox) {
        try {
            const [x, y, w, h] = bbox;
            const padding = Math.floor(Math.min(w, h) * 0.45);
            const cropX = Math.max(0, x - padding);
            const cropY = Math.max(0, y - padding);
            const cropW = Math.min(video.videoWidth - cropX, w + padding * 2);
            const cropH = Math.min(video.videoHeight - cropY, h + padding * 2);

            const tc = document.createElement("canvas");
            tc.width = cropW; tc.height = cropH;
            tc.getContext("2d").drawImage(video, cropX, cropY, cropW, cropH, 0, 0, cropW, cropH);

            const imageBase64 = tc.toDataURL("image/jpeg", 0.90);
            const res = await fetch(API + "/auto-add-criminal", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ image: imageBase64 })
            });
            const data = await res.json();
            if (data.message === "Added to criminal database") {
                const alertEl = document.getElementById("auto-add-alert");
                alertEl.innerHTML = `<i class="fa-solid fa-user-plus mr-2"></i>NEW CRIMINAL ADDED: ${data.name}`;
                alertEl.classList.remove("hidden");
                setTimeout(() => alertEl.classList.add("hidden"), 6000);
                addAlert("autoadd", "Auto-added criminal", data.name);
            }
        } catch (e) { console.error("Auto-add failed:", e); }
    }

    async function checkCriminalMatch(bbox) {
        try {
            const [x, y, w, h] = bbox;
            const padding = Math.floor(Math.min(w, h) * 0.45);
            const cropX = Math.max(0, x - padding);
            const cropY = Math.max(0, y - padding);
            const cropW = Math.min(video.videoWidth - cropX, w + padding * 2);
            const cropH = Math.min(video.videoHeight - cropY, h + padding * 2);

            const tc = document.createElement("canvas");
            tc.width = cropW; tc.height = cropH;
            tc.getContext("2d").drawImage(video, cropX, cropY, cropW, cropH, 0, 0, cropW, cropH);

            const imageBase64 = tc.toDataURL("image/jpeg", 0.90);
            const res = await fetch(API + "/check-match", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ image: imageBase64 })
            });
            const data = await res.json();
            if (data.match && data.match.similarity > 0.50) {
                const alertEl = document.getElementById("criminal-alert");
                const pct = (data.match.similarity * 100).toFixed(0);
                alertEl.innerHTML = `<i class="fa-solid fa-user-secret mr-2"></i>CRIMINAL MATCH: ${data.match.name} (${pct}%)`;
                alertEl.classList.remove("hidden");
                setTimeout(() => alertEl.classList.add("hidden"), 7000);
                addAlert("match", `MATCH: ${data.match.name}`, `${pct}% confidence`);

                if (data.match.criminal_id && (Date.now() - lastWeaponTime) < 10000) {
                    fetch(`${API}/criminals/${data.match.criminal_id}/weapon-detection`, { method: "POST" }).catch(() => {});
                }
            }
        } catch (e) { console.error("Criminal match failed:", e); }
    }

    async function captureScreenshot() {
        if (!video.videoWidth || screenshotInFlight) return false;

        const now = Date.now();
        if (now - lastScreenshotTime < SCREENSHOT_COOLDOWN) return false;

        lastScreenshotTime = now;
        screenshotInFlight = true;

        const tc = document.createElement("canvas");
        tc.width = video.videoWidth;
        tc.height = video.videoHeight;
        tc.getContext("2d").drawImage(video, 0, 0);

        try {
            await fetch(API + "/capture-screenshot", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ image: tc.toDataURL("image/jpeg", 0.65) })
            });
            return true;
        } catch (e) {
            console.error("Screenshot failed", e);
            return false;
        } finally {
            screenshotInFlight = false;
        }
    }

    async function manualCapture() {
        if (!video.srcObject) return alert("Start the camera first!");
        const saved = await captureScreenshot();
        if (saved) {
            addAlert("manual", "Manual screenshot saved", null);
            alert("Manual screenshot saved!");
        } else {
            alert("Please wait 3 seconds between screenshots.");
        }
    }

    window.onbeforeunload = stopCamera;
</script>
</body>
</html>
